#version 1.2


map $http_accept_language $lang {
   default en;
   #~es es;
   #~fr fr;
   ~*^es es; # Coincidencia más robusta (insensible a mayúsculas/minúsculas, al inicio)
   ~*^fr fr; # Coincidencia más robusta
}


map $http_upgrade $connection_upgrade {
   default upgrade;
   ''      close;
}


server {
   listen 60080;
   listen 60443 ssl;


   ssl_certificate /etc/ssl/certs/la-certificate.crt;
   ssl_certificate_key /etc/ssl/private/la-certificate.key;


   ssl_protocols             TLSv1.2 TLSv1.3;
   ssl_prefer_server_ciphers on;
   ssl_dhparam               /etc/nginx/la-dhparam.pem;
   ssl_ciphers               EECDH+AESGCM:EDH+AESGCM;
   ssl_ecdh_curve            secp384r1;
   ssl_session_timeout       10m;
   ssl_session_cache         shared:SSL:10m;
   ssl_session_tickets       off;
   ssl_stapling              on;
   ssl_stapling_verify       on;


   # --- Cabeceras de Seguridad ---
   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; # Forza HTTPS
   add_header X-Frame-Options "SAMEORIGIN" always; # Previene Clickjacking
   add_header X-Content-Type-Options "nosniff" always; # Previene MIME-sniffing
   add_header Referrer-Policy "strict-origin-when-cross-origin" always; # Controla la cabecera Referer
   # add_header Content-Security-Policy "default-src 'self'; ..." always; # CSP es potente pero requiere configuración detallada


   access_log /var/log/nginx/la-webserver-access.log;
   error_log /var/log/nginx/la-webserver-error.log;


   proxy_ignore_headers  "Cache-Control" "Expires";
   proxy_set_header      Host $host;
   proxy_set_header      X-Server-Address $server_addr;
   proxy_set_header      X-Real-IP $remote_addr;
   proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header      X-Forwarded-Proto $scheme;
   proxy_pass_header     Set-Cookie;
   proxy_set_header      Cookie $http_cookie;


   client_max_body_size  2500m;


   absolute_redirect     off;
   port_in_redirect      off;


   # Set the proxy cache key
   set $cache_key $scheme$host$uri$is_args$args;


   root /apps/nginx/www;
   #index index.html;
   #error_page 404 /;


   location = / {
       # Redirección temporal (302) para pruebas, cambiar a 301 (permanente) en producción
       rewrite ^ /web_index_redirect_to_app.cgi?host=$host,path=login/#/$lang/home last;
   }


   location /ws/la-core-notifier/ {
       # Ruta para las conexiones WebSocket
       proxy_pass http://localhost:60070/;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "upgrade";
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;


       # Opcional: timeouts más largos para WebSockets
       proxy_connect_timeout 60s;
       proxy_send_timeout 600s; # 10 minutos
       proxy_read_timeout 600s; # 10 minutos
   }


   location /ws/la-core-alarm/ {
       proxy_pass http://localhost:60071/;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "upgrade";
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;


       proxy_connect_timeout 60s;
       proxy_send_timeout 600s;
       proxy_read_timeout 600s;
   }


   location ~ ^/websettings/ {
       rewrite ^/websettings/ /$lang/websettings/ redirect;
   }


   location = /config.html {
       rewrite ^/config.html /$lang/websettings/config.html redirect;
   }


   location ~ ^/(en|es|fr)/websettings/ {
       auth_request /auth_form.cgi;
       error_page 401 = @error401;
       proxy_request_buffering off;
       proxy_pass http://127.0.0.1:60088;
       proxy_cache_valid any 0;
   }


   location @error401 {
        #rewrite ^ / last;
        rewrite ^ /web_index_redirect_to_app.cgi?host=$host,path=login/#/$lang/home last;
   }




   location = /auth_form.cgi {
       proxy_pass              http://127.0.0.1:60088;
       proxy_pass_request_body off;
       proxy_set_header        Content-Length "";
       proxy_set_header        X-Original-URI $request_uri;
       proxy_set_header        X-Real-IP $remote_addr;
       proxy_set_header        X-Forwarded-Proto $scheme;
   }


   # location /login {
       # alias /data/web-core-view/var/www/browser;
       # try_files $uri $uri/ /index.html;
   # }


   location /hls/ {
       auth_request /auth.cgi;
       error_page 401 = @error401;
       proxy_pass http://localhost:60888/stream/;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "upgrade";
       proxy_set_header Host $host;
   }


   location /stream/ {
       auth_request /auth.cgi;
       error_page 401 = @error401;
       proxy_pass http://localhost:60889/stream/;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "upgrade";
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   }


   location ^~ /login/ {
  
       if ($scheme = http) {
           rewrite ^ /web_index_redirect_to_app.cgi?host=$host,path=$request_uri last;
       }
       alias /data/web-core-view/var/www/browser/;
       try_files $uri $uri/ /login/index.html;
   }


